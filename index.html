function ImportPage({products,setProducts,sales,setSales,expenses,setExpenses,mileage=[],setMileage,showToast}){
  const [type,setType]=useState('sales');
  const [rows,setRows]=useState([]);
  const [errors,setErrors]=useState([]);
  const [imported,setImported]=useState(false);
  const [dupIdxs,setDupIdxs]=useState([]);
  const [skipDups,setSkipDups]=useState(true);
  const fileRef=useRef();

  const PROD_TEMPLATE="id,name,cat,price,cost,taxable,stock,emoji\n,Air Bites,Freeze Dried Candy,5,1.20,true,20,🍬\n,3lb Honey Jug,Honey,20,0,false,10,🍯";

  const EXP_TEMPLATE="Date (YYYY-MM-DD),Description,Amount ($),Schedule C Category,Vendor,Notes\n2024-03-15,Freeze dryer bags,45,Supplies,Amazon,";

  const parseCSV=(text)=>{
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length<2)return{headers:[],rows:[]};
    const headers=lines[0].split(',').map(h=>h.trim());
    const rows=lines.slice(1).map(l=>{
      const vals=[];let cur='';let inQ=false;
      for(let ch of l){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=ch;}
      vals.push(cur.trim());
      return headers.reduce((o,h,i)=>{o[h]=vals[i]||'';return o;},{});
    }).filter(r=>Object.values(r).some(v=>v));
    return{headers,rows};
  };

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    setRows([]);setErrors([]);setImported(false);
    const isXlsx=file.name.match(/\.xlsx?$/i);
    const reader=new FileReader();
    reader.onload=async ev=>{
      let parsed=[];
      if(isXlsx){
        try{
          const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          const keywords=['date','description','amount','subtotal','total','items','name','price'];
          const headerIdx=raw.findIndex(r=>{const ne=r.filter(cell=>String(cell||'').trim()!=='');return ne.length>=3&&ne.some(cell=>keywords.some(k=>String(cell||'').replace(/\r\n|\n/g,' ').toLowerCase().includes(k)));});
          if(headerIdx===-1){setErrors(['Could not find header row. Make sure you are using the correct template.']);return;}
          const headers=raw[headerIdx].map(h=>String(h||'').replace(/\r\n|\n/g,' ').replace(/\s+/g,' ').trim());
          const dataRows=raw.slice(headerIdx+1).filter(r=>r.some(cell=>cell!==''&&cell!=null));
          // Convert Excel serial dates to YYYY-MM-DD strings
          const excelDateToStr=v=>{
            if(!v)return '';
            if(v instanceof Date)return v.toISOString().slice(0,10);
            if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().slice(0,10);}
            return String(v).trim();
          };
          parsed=dataRows.map(row=>headers.reduce((o,h,i)=>{
            const raw_val=row[i];
            // Convert dates in date column
            const val=h.toLowerCase().includes('date')?excelDateToStr(raw_val):(raw_val!=null?String(raw_val).trim():'');
            o[h]=val;return o;
          },{})).filter(r=>Object.values(r).some(v=>v));
        }catch(err){setErrors(['Could not read file: '+err.message]);return;}
      } else {
        const{rows:csvRows}=parseCSV(ev.target.result);
        parsed=csvRows;
      }
      if(type==='invoice'){
        // Invoice OCR path
        if(!settings?.anthropicKey){setErrors(['Add Anthropic API key in Settings to use invoice scanning.']);return;}
        setErrors([]);
        const base64=ev.target.result.split(',')[1];
        const mimeType=file.type||'image/jpeg';
        setErrors(['🤖 Scanning invoice...']);
        try{
          const result=await ocrReceipt(base64,mimeType,settings.anthropicKey,'invoice');
          if(result){
            const row={date:result.date||'',vendor:result.vendor||'',amount:result.amount||0,description:result.description||'',cat:result.category||'Supplies',notes:(result.invoice_number?'Invoice #'+result.invoice_number:'')+(result.due_date?' Due: '+result.due_date:'')};
            setRows([row]);setErrors([]);
          } else {setErrors(['Could not extract data from invoice.']);}
        }catch(e){setErrors(['Invoice scan failed: '+e.message]);}
        return;
      }
      if(!parsed.length){setErrors(['No data rows found. Fill in at least one row before importing.']);setRows([]);return;}
      const errs=[];
      const mapped=parsed.map((r,i)=>{
        if(type==='sales'){
          const rk=k=>{const keys=Object.keys(r);return keys.find(h=>h.toLowerCase()===k.toLowerCase())||keys.find(h=>h.toLowerCase().startsWith(k.toLowerCase()))||keys.find(h=>h.toLowerCase().includes(k.toLowerCase()))||'';};
          const rv=k=>r[rk(k)]||'';
          const date=rv('date');
          // Skip if date looks like a header label
          if(date&&date.toLowerCase().includes('yyyy'))return null;
          const itemsRaw=rv('items');
          const total=parseFloat(rv('total ($)')||rv('total')||0);
          const sub=parseFloat(rv('subtotal ($)')||rv('subtotal')||0);
          const tax=parseFloat(rv('tax amount ($)')||rv('tax')||0);
          const disc=parseFloat(rv('discount ($)')||rv('discount')||0);
          const pay=rv('payment method')||rv('payment')||'Cash';
          const notes=rv('notes');
          if(!date)errs.push('Row '+(i+2)+': missing date');
          const items=itemsRaw.split(',').map(s=>s.trim()).filter(Boolean).map(s=>{
            const parts=s.split('×');
            return{name:parts[0]?.trim()||s,qty:parseInt(parts[1])||1,emoji:'🛍️'};
          });
          return{date,items,subtotal:sub,taxAmt:tax,discount:disc,total,payMethod:pay,notes};
        } else if(type==='expenses'){
          const rk=k=>Object.keys(r).find(h=>h.toLowerCase().includes(k.toLowerCase()))||'';
          const rv=k=>r[rk(k)]||'';
          const date=rv('date');
          const desc=rv('description');
          const amount=parseFloat(rv('amount')||0);
          const cat=rv('category')||rv('schedule')||'Other';
          const vendor=rv('vendor');
          const notes=rv('notes');
          if(!date||!desc||!amount)errs.push('Row '+(i+2)+': missing date, description, or amount');
          return{date,description:desc,amount,cat,vendor,notes};
        } else if(type==='mileage'){
          const rk=k=>{const keys=Object.keys(r);return keys.find(h=>h.toLowerCase()===k.toLowerCase())||keys.find(h=>h.toLowerCase().includes(k.toLowerCase()))||'';};
          const rv=k=>r[rk(k)]||'';
          const date=rv('date');
          if(date&&date.toLowerCase().includes('yyyy'))return null;
          const miles=parseFloat(rv('miles')||0);
          const purpose=rv('purpose');
          const from=rv('from');
          const to=rv('to');
          const notes=rv('notes');
          if(!date||!miles)errs.push('Row '+(i+2)+': missing date or miles');
          const rate=irsRate(date);
          const deduction=parseFloat((miles*rate).toFixed(2));
          return{date,from,to,miles,purpose,notes,rate,deduction};
        } else {
          const name=r['name']||'';
          const price=parseFloat(r['price']||0);
          const cost=parseFloat(r['cost']||0);
          const cat=r['cat']||'Honey';
          const taxable=r['taxable']==='true'||r['taxable']==='1';
          const stock=parseInt(r['stock']||0);
          const emoji=r['emoji']||'🛍️';
          if(!name)errs.push('Row '+(i+2)+': missing name');
          return{name,price,cost,cat,taxable,stock,emoji,active:true,salePrice:'',saleStart:'',saleEnd:''};
        }
      }).filter(Boolean);
      // Duplicate detection
      const dups=mapped.map((r,i)=>{
        if(type==='sales'){
          const sig=r.date+'|'+r.total+'|'+r.payMethod+'|'+(r.items||[]).map(x=>x.name+'x'+x.qty).join(',');
          const isDup=sales.some(s=>{const s2=s.date+'|'+s.total+'|'+s.payMethod+'|'+(s.items||[]).map(x=>x.name+'x'+x.qty).join(',');return sig===s2;});
          return isDup?i:-1;
        } else if(type==='expenses'){
          const isDup=expenses.some(e=>e.date===r.date&&e.description===r.description&&+e.amount===+r.amount&&e.vendor===r.vendor);
          return isDup?i:-1;
        } else if(type==='mileage'){
          const isDup=mileage.some(m=>m.date===r.date&&+m.miles===+r.miles&&m.purpose===r.purpose);
          return isDup?i:-1;

          return -1; // products: update existing is fine, no dup warning needed

      }).filter(i=>i>=0);
      setDupIdxs(dups);
      setErrors(errs);

function InventoryPage({products,setProducts,employees,inventoryLots,setInventoryLots,sales,showToast}){
  const blankLot={productId:'',qty:'',dateAdded:'',notes:'',profitSharing:false,employeeShares:[]};
  const [showAddLot,setShowAddLot]=useState(false);
  const [invView,setInvView]=useState('levels');
  const [editLotId,setEditLotId]=useState(null);
  const [f,setF]=useState(blankLot);
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));

  // Calculate profit sharing owed per employee across all sales
  const profitSharingOwed=React.useMemo(()=>{
    const owed={};
    // For each sale, find which lots were consumed (FIFO) and calculate profit share
    // We track lot consumption via inventoryLots[].consumed array
    (inventoryLots||[]).forEach(lot=>{
      if(!lot.profitSharing||!lot.employeeShares?.length)return;
      const product=products.find(p=>p.id===lot.productId);
      if(!product)return;
      (lot.consumed||[]).forEach(sale=>{
        const profit=(sale.salePrice-product.cost)*sale.qty;
        lot.employeeShares.forEach(es=>{
          const share=profit*(es.pct/100);
          owed[es.employeeId]=(owed[es.employeeId]||0)+share;
        });
      });
    });
    return owed;
  },[inventoryLots,products,sales]);

  const saveLot=()=>{
    if(!f.productId||!f.qty)return;
    const product=products.find(p=>p.id===f.productId);
    if(!product)return;
    if(editLotId){
      // Edit: adjust product stock by difference
      const oldLot=inventoryLots.find(l=>l.id===editLotId);
      const diff=(+f.qty)-(oldLot?.qty||0);
      setInventoryLots(prev=>prev.map(l=>l.id===editLotId?{...l,...f,qty:+f.qty,originalQty:+f.qty,productName:product.name}:l));
      if(diff!==0)setProducts(prev=>prev.map(p=>p.id===f.productId?{...p,stock:Math.max(0,p.stock+diff)}:p));
      setEditLotId(null);setF(blankLot);setShowAddLot(false);showToast('Lot updated');
      return;
    }
    addLot();
  };

  const deleteLot=id=>{
    if(!confirm('Delete this inventory lot? Stock will be adjusted.'))return;
    const lot=inventoryLots.find(l=>l.id===id);
    if(lot){setProducts(prev=>prev.map(p=>p.id===lot.productId?{...p,stock:Math.max(0,p.stock-lot.qty)}:p));}

  const addLot=()=>{
